name = "oracle-mirror-bff"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# 通常変数(Secret ではない)
[vars]
OPENAI_MODEL = "gpt-5.5"
# カンマ区切り。デプロイ時に人間が wrangler.toml を編集して差し替えるか、wrangler secret で上書き
ALLOWED_ORIGINS = "capacitor://localhost,ionic://localhost,http://localhost,http://localhost:5173"

# Secrets は wrangler secret put で別途登録:
# - OPENAI_API_KEY
# - ANU_API_KEY   (Phase 4.16: 量子乱数 /random 用。`wrangler secret put ANU_API_KEY` を人間が実行)

# 観測性(Cloudflare ダッシュボードでログが見える)
[observability]
enabled = true
